name: Update IPO/Bond Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'
  push:
    paths:
      - 'generate_ics.py'

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Generate ICS
        run: python generate_ics.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ipo_bond_calendar.ics
          git diff --cached --quiet || git commit -m "更新打新日历 $(date +%Y-%m-%d)"
          git push
